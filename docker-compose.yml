version: '3.8'

services:
  app:
    build: .
    container_name: book-market-research-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - SERPAPI_API_KEY=${SERPAPI_API_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - AMAZON_SP_API_WEBHOOK_URL=${AMAZON_SP_API_WEBHOOK_URL}
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      - KEYWORDS_EVERYWHERE_API_KEY=${KEYWORDS_EVERYWHERE_API_KEY}
      - SCRAPINGBEE_API_KEY=${SCRAPINGBEE_API_KEY}
      - CRAYO_API_KEY=${CRAYO_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - NEXT_PUBLIC_SERPAPI_CONFIGURED=true
      - NEXT_PUBLIC_AMAZON_CONFIGURED=true
      - NEXT_PUBLIC_DATAFORSEO_CONFIGURED=true
      - NEXT_PUBLIC_KW_EVERYWHERE_CONFIGURED=true
      - NEXT_PUBLIC_SCRAPINGBEE_CONFIGURED=true
      - NEXT_PUBLIC_CRAYO_CONFIGURED=true
      - NEXT_PUBLIC_ELEVENLABS_CONFIGURED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
